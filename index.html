<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D T-Shirt Customizer Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #333;
        }
    </style>
    <!-- Konfigurasi Import Map untuk Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="text-white font-sans">

    <!-- UI Controls -->
    <div class="ui-panel p-6 rounded-lg shadow-2xl max-w-sm">
        <h2 class="text-xl font-bold mb-2 text-blue-400">Arsitektur Desain 3D</h2>
        <p class="text-xs text-gray-400 mb-6">Upload gambar 2D (PNG/JPG) untuk mengganti tekstur pada objek 3D secara real-time.</p>
        
        <label class="block mb-2 text-sm font-medium text-gray-300" for="design-upload">Unggah Desain 2D</label>
        <input class="block w-full text-sm text-gray-400 border border-gray-600 rounded-lg cursor-pointer bg-gray-800 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-l-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 transition-all" 
               id="design-upload" type="file" accept="image/png, image/jpeg">
        
        <div class="mt-6 p-4 bg-green-900/30 rounded border border-green-800">
            <h3 class="text-xs font-bold text-green-400 mb-1">Status: Model Terhubung</h3>
            <p class="text-[10px] text-gray-300">File "oversized_t-shirt" berhasil dimuat menggunakan GLTFLoader. Silakan unggah gambar untuk menerapkan tekstur.</p>
        </div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Logika Three.js -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Setup Dasar: Scene, Camera, Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        // Menambahkan fog untuk efek kedalaman visual
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. Setup Kontrol Rotasi (Mouse/Touch)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 25;

        // 3. Setup Pencahayaan (Krusial untuk melihat tekstur dan bentuk)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); // Cahaya dasar
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1); // Cahaya utama
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        // 4. Memuat Model GLTF Asli
        let tShirtModel = null;
        let tShirtMaterials = [];
        const loader = new GLTFLoader();

        loader.load('oversized_t-shirt.zip/scene.gltf', function(gltf) {
            tShirtModel = gltf.scene;
            
            // Pusatkan model ke tengah layar
            const box = new THREE.Box3().setFromObject(tShirtModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            tShirtModel.position.sub(center); 
            
            // Skalakan model secara dinamis agar pas di layar
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 12 / maxDim;
            tShirtModel.scale.set(scale, scale, scale);

            // Ekstrak semua material dari model untuk diubah nanti
            tShirtModel.traverse((child) => {
                if (child.isMesh) {
                    tShirtMaterials.push(child.material);
                }
            });

            scene.add(tShirtModel);
        }, undefined, function(error) {
            console.error('Error memuat model:', error);
        });

        // 5. Logika Upload Gambar & Mapping Tekstur 2D ke 3D
        const uploadInput = document.getElementById('design-upload');
        const textureLoader = new THREE.TextureLoader();

        uploadInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file || tShirtMaterials.length === 0) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const imageSrc = e.target.result;
                
                // Muat gambar sebagai tekstur
                textureLoader.load(imageSrc, function(texture) {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    texture.flipY = false; // Model GLTF memerlukan flipY false agar gambar tidak terbalik
                    
                    // Terapkan tekstur baru ke semua material baju
                    tShirtMaterials.forEach(mat => {
                        mat.map = texture;
                        mat.needsUpdate = true;
                    });
                });
            };
            reader.readAsDataURL(file);
        });

        // 6. Handle Resize Layar
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 7. Loop Animasi Utama
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            
            // Rotasi model baju jika sudah dimuat
            if (tShirtModel) {
                tShirtModel.rotation.y += 0.002;
            }
            
            renderer.render(scene, camera);
        }

        // Mulai animasi
        animate();
    </script>
</body>
</html>
