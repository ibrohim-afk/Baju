<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shirt Configurator</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #e0e0e0; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        #ui-panel { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            z-index: 10; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
        }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }
        input[type="file"] { width: 100%; font-size: 14px; }
        input[type="color"] { width: 100%; height: 40px; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; font-family: system-ui, sans-serif; transition: opacity 0.5s;
        }
        #loading-text { font-weight: bold; font-size: 1.2rem; margin-bottom: 10px; }
        #loading-progress { font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-text">Memuat Model 3D...</div>
        <div id="loading-progress">Menghubungkan...</div>
    </div>

    <div id="ui-panel">
        <div class="control-group">
            <label for="uploadDesain">1. Unggah Desain (Wajib PNG Transparan):</label>
            <input type="file" id="uploadDesain" accept="image/png">
        </div>
        <div class="control-group">
            <label for="pilihWarna">2. Warna Dasar Kain:</label>
            <input type="color" id="pilihWarna" value="#ffffff">
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========================================================
        // KONFIGURASI URL MODEL GITHUB (VIA JSDELIVR CDN)
        // PERINGATAN: Repositori 'ibrohim-afk/Baju' WAJIB di-set Publik.
        // Jika privat, URL ini akan mengembalikan error 404/Failed to load.
        // ========================================================
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/ibrohim-afk/Baju@main/oversized_t-shirt__1_.glb';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(2, 5, 3);
        scene.add(directionalLight);

        let bajuModel;
        let targetMaterials = []; 

        const loader = new GLTFLoader();
        const progressEl = document.getElementById('loading-progress');

        loader.load(
            MODEL_URL,
            (gltf) => {
                bajuModel = gltf.scene;

                const box = new THREE.Box3().setFromObject(bajuModel);
                const center = box.getCenter(new THREE.Vector3());
                bajuModel.position.sub(center); 

                bajuModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        targetMaterials.push(child.material);
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(bajuModel);
                
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
            },
            (xhr) => {
                if (xhr.lengthComputable) {
                    const percentComplete = xhr.loaded / xhr.total * 100;
                    progressEl.innerText = Math.round(percentComplete, 2) + '% terunduh...';
                } else {
                    const megabytes = (xhr.loaded / (1024 * 1024)).toFixed(2);
                    progressEl.innerText = megabytes + ' MB terunduh...';
                }
            },
            (error) => {
                console.error(error);
                document.getElementById('loading-text').innerText = "Gagal memuat GLB dari GitHub.";
                progressEl.innerText = "Periksa URL di variabel MODEL_URL dan pastikan repo bersifat Publik.";
            }
        );

        document.getElementById('uploadDesain').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const texture = new THREE.Texture(img);
                    texture.flipY = false; 
                    texture.colorSpace = THREE.SRGBColorSpace; 
                    texture.needsUpdate = true;

                    targetMaterials.forEach(mat => {
                        mat.map = texture;
                        // KRUSIAL UNTUK EFEK "NYATU": Aktifkan transparansi
                        mat.transparent = true;
                        mat.alphaTest = 0.05; // Mencegah glitch pada batas piksel transparan
                        mat.needsUpdate = true;
                    });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('pilihWarna').addEventListener('input', (e) => {
            const hexColor = e.target.value;
            const threeColor = new THREE.Color(hexColor);
            
            targetMaterials.forEach(mat => {
                mat.color = threeColor;
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
