<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Baju Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --panel: #16161a;
      --border: #2a2a32;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #6b6b7a;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── CANVAS AREA ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      background: radial-gradient(ellipse at 50% 40%, #1a1a24 0%, #0d0d0f 70%);
    }

    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .canvas-label {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading p {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── SIDE PANEL ── */
    #panel {
      width: 280px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 28px;
      overflow-y: auto;
    }

    .panel-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .panel-header h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .panel-header h1 span { color: var(--accent); }
    .panel-header p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 -20px;
    }

    /* Section */
    .section { display: flex; flex-direction: column; gap: 12px; }

    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Upload button */
    .upload-btn {
      position: relative;
      cursor: pointer;
    }
    .upload-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-face {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }
    .upload-btn:hover .upload-face {
      border-color: var(--accent);
      background: rgba(232, 255, 71, 0.04);
    }
    .upload-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(232,255,71,0.1);
      border-radius: 8px;
      font-size: 18px;
    }
    .upload-face strong {
      font-size: 13px;
      font-weight: 500;
    }
    .upload-face small {
      font-size: 11px;
      color: var(--muted);
    }

    /* Preview thumbnail */
    #preview-wrap {
      display: none;
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #preview-wrap img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }
    #preview-wrap .remove-btn {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.7);
      border: none;
      color: #fff;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    #preview-wrap .remove-btn:hover { background: rgba(255,50,50,0.8); }

    /* Color picker row */
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .color-row:hover { border-color: var(--muted); }

    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      background: #ffffff;
      transition: background 0.2s;
    }

    .color-info { flex: 1; }
    .color-info span {
      display: block;
      font-size: 12px;
      font-weight: 500;
    }
    .color-info small {
      font-size: 11px;
      color: var(--muted);
    }

    #pilihWarna {
      position: absolute;
      opacity: 0;
      width: 0; height: 0;
      pointer-events: none;
    }

    /* Reset button */
    .reset-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 10px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .reset-btn:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* Status bar */
    #status-bar {
      margin-top: auto;
      padding: 10px 14px;
      background: rgba(232,255,71,0.06);
      border: 1px solid rgba(232,255,71,0.15);
      border-radius: var(--radius);
      font-size: 11px;
      color: var(--accent);
      line-height: 1.5;
      display: none;
    }
    #status-bar.show { display: block; }

    /* Scrollbar */
    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ─── CANVAS ─── -->
<div id="canvas-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <p>Memuat model baju...</p>
  </div>
  <span class="canvas-label">Drag untuk memutar · Scroll untuk zoom</span>
</div>

<!-- ─── SIDE PANEL ─── -->
<div id="panel">

  <div class="panel-header">
    <h1>Baju<span>3D</span></h1>
    <p>Upload desain kustom & pilih warna kain secara real-time.</p>
  </div>

  <div class="divider"></div>

  <!-- SECTION 1: Upload Desain -->
  <div class="section">
    <span class="section-label">① Desain / Motif</span>

    <label class="upload-btn">
      <!-- ╔══════════════════════════════════════════╗ -->
      <!-- ║  LETAKKAN DI LUAR init() — di level root ║ -->
      <!-- ╚══════════════════════════════════════════╝ -->
      <input type="file" id="uploadDesain" accept="image/*" />
      <div class="upload-face">
        <div class="upload-icon">🖼️</div>
        <strong>Klik untuk upload gambar</strong>
        <small>PNG, JPG, SVG — maks. 10MB</small>
      </div>
    </label>

    <div id="preview-wrap">
      <img id="preview-img" src="" alt="preview" />
      <button class="remove-btn" id="removeDesain">✕ Hapus</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- SECTION 2: Color Picker -->
  <div class="section">
    <span class="section-label">② Warna Dasar Kain</span>

    <!-- ╔══════════════════════════════════════════╗ -->
    <!-- ║  LETAKKAN DI LUAR init() — di level root ║ -->
    <!-- ╚══════════════════════════════════════════╝ -->
    <input type="color" id="pilihWarna" value="#ffffff" />

    <div class="color-row" id="colorRow" onclick="document.getElementById('pilihWarna').click()">
      <div class="color-swatch" id="colorSwatch"></div>
      <div class="color-info">
        <span id="colorHex">#ffffff</span>
        <small>Klik untuk mengubah warna</small>
      </div>
      <span style="font-size:16px">🎨</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- SECTION 3: Reset -->
  <div class="section">
    <span class="section-label">③ Reset</span>
    <button class="reset-btn" id="resetBtn">↺ Kembalikan ke default</button>
  </div>

  <!-- Status -->
  <div id="status-bar"></div>

</div><!-- /#panel -->


<!-- ─────────────────────────────────────────────── -->
<!--  THREE.JS — pakai type="module" seperti        -->
<!--  struktur kode kamu yang sudah ada             -->
<!-- ─────────────────────────────────────────────── -->
<script type="module">

  import * as THREE        from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
  import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js';
  import { GLTFLoader }    from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

  /* ════════════════════════════════════════════════
     SETUP SCENE — bagian init() kamu
  ════════════════════════════════════════════════ */
  const wrap     = document.getElementById('canvas-wrap');
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.shadowMap.enabled = true;
  wrap.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
  camera.position.set(0, 0.5, 3);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance   = 1;
  controls.maxDistance   = 6;
  controls.target.set(0, 0.3, 0);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(3, 5, 3);
  scene.add(dirLight);
  const rimLight = new THREE.DirectionalLight(0xe8ff47, 0.3);
  rimLight.position.set(-3, 2, -3);
  scene.add(rimLight);

  /* ════════════════════════════════════════════════
     VARIABEL GLOBAL
     bajuModel  — referensi model (sama dengan kamu)
     origMaps   — menyimpan texture asli tiap mesh
                  agar bisa di-reset
  ════════════════════════════════════════════════ */
  let bajuModel  = null;
  const origMaps = new Map();   // key: mesh.uuid → value: texture asli

  /* ════════════════════════════════════════════════
     LOAD MODEL GLB
     Ganti URL di bawah dengan path file .glb kamu.
     Jika dijalankan lokal, pastikan ada web server
     (Live Server / python -m http.server).
  ════════════════════════════════════════════════ */
  /* ── Fungsi setup model (dipanggil setelah load berhasil) ── */
  function setupModel(gltf) {
    if (bajuModel) scene.remove(bajuModel);   // hapus model lama jika ada
    bajuModel = gltf.scene;
    scene.add(bajuModel);

    // Auto center & scale
    const box    = new THREE.Box3().setFromObject(bajuModel);
    const size   = box.getSize(new THREE.Vector3()).length();
    const center = box.getCenter(new THREE.Vector3());
    bajuModel.position.sub(center);
    bajuModel.scale.setScalar(2 / size);

    // Simpan texture asli setiap mesh untuk reset
    origMaps.clear();
    bajuModel.traverse((child) => {
      if (child.isMesh && child.material) {
        origMaps.set(child.uuid, child.material.map || null);
      }
    });

    document.getElementById('loading').classList.add('hidden');
    showStatus('✓ Model berhasil dimuat');
  }

  /* ── Load otomatis, fallback ke upload manual jika gagal ── */
  const loader = new GLTFLoader();
  loader.load(
    'oversized_t-shirt(1).glb',
    setupModel,
    undefined,
    (err) => {
      // Gagal load otomatis → tampilkan tombol upload manual
      const loadEl = document.getElementById('loading');
      loadEl.innerHTML = `
        <div style="text-align:center;padding:20px;max-width:300px">
          <p style="color:#ff6b35;font-size:14px;margin-bottom:12px">
            ⚠️ File .glb tidak terbaca otomatis
          </p>
          <p style="color:#6b6b7a;font-size:12px;margin-bottom:20px;line-height:1.6">
            Cek apakah nama file di GitHub persis:<br>
            <code style="color:#e8ff47">oversized_t-shirt__1_.glb</code>
            <br><br>Atau upload langsung dari perangkat kamu:
          </p>
          <label style="
            display:inline-block;cursor:pointer;
            background:#e8ff47;color:#0d0d0f;
            padding:10px 20px;border-radius:8px;
            font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px
          ">
            📂 Upload file .glb
            <input type="file" id="uploadGLB" accept=".glb,.gltf" style="display:none" />
          </label>
        </div>`;

      document.getElementById('uploadGLB').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        loadEl.innerHTML = '<div class="spinner"></div><p>Memuat model...</p>';
        loader.load(URL.createObjectURL(file), setupModel, undefined, (e2) => {
          loadEl.querySelector('p').textContent = '❌ File tidak valid';
          console.error(e2);
        });
      });
      console.warn('Auto-load gagal:', err);
    }
  );

  /* ════════════════════════════════════════════════
     ① FUNGSI UPLOAD DESAIN / TEXTURE
     ─ Letakkan di LUAR init(), tapi masih di dalam
       <script type="module"> yang sama.
     ─ Dipanggil oleh event listener di bawah.
  ════════════════════════════════════════════════ */
  function applyTextureToModel(imageUrl) {
    if (!bajuModel) {
      showStatus('⚠️ Model belum dimuat');
      return;
    }

    // TextureLoader Three.js membaca URL (bisa blob URL dari FileReader)
    const textureLoader = new THREE.TextureLoader();
    textureLoader.load(imageUrl, (texture) => {

      // ★ PENTING: flipY = false untuk format GLTF agar gambar tidak terbalik
      texture.flipY = false;
      texture.encoding = THREE.sRGBEncoding;

      // traverse mencari semua Mesh dalam model dan menerapkan texture
      bajuModel.traverse((child) => {
        if (child.isMesh) {
          child.material.map           = texture;
          child.material.needsUpdate   = true;   // wajib agar Three.js re-render material
        }
      });

      showStatus('✓ Desain berhasil diterapkan');
    });
  }

  /* ════════════════════════════════════════════════
     ② FUNGSI UBAH WARNA KAIN
     ─ Letakkan di LUAR init(), level yang sama.
  ════════════════════════════════════════════════ */
  function applyColorToModel(hexColor) {
    if (!bajuModel) return;

    const color = new THREE.Color(hexColor);   // konversi hex → Three.Color

    bajuModel.traverse((child) => {
      if (child.isMesh) {
        child.material.color.set(color);
        child.material.needsUpdate = true;
      }
    });
  }

  /* ════════════════════════════════════════════════
     ③ FUNGSI RESET
  ════════════════════════════════════════════════ */
  function resetModel() {
    if (!bajuModel) return;

    bajuModel.traverse((child) => {
      if (child.isMesh) {
        child.material.map           = origMaps.get(child.uuid) || null;
        child.material.color.set(0xffffff);
        child.material.needsUpdate   = true;
      }
    });

    // Reset UI
    document.getElementById('pilihWarna').value = '#ffffff';
    document.getElementById('colorSwatch').style.background = '#ffffff';
    document.getElementById('colorHex').textContent = '#ffffff';
    document.getElementById('preview-wrap').style.display = 'none';

    showStatus('↺ Model direset ke default');
  }

  /* ════════════════════════════════════════════════
     EVENT LISTENERS
     ─ Semua di LUAR init() — di level root script.
     ─ Menghubungkan elemen HTML dengan fungsi di atas.
  ════════════════════════════════════════════════ */

  // (A) Upload Desain — menggunakan FileReader agar berjalan tanpa server
  document.getElementById('uploadDesain').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const imageUrl = event.target.result;   // data URL (base64)

      // Terapkan ke model
      applyTextureToModel(imageUrl);

      // Tampilkan preview thumbnail di panel
      const previewWrap = document.getElementById('preview-wrap');
      document.getElementById('preview-img').src = imageUrl;
      previewWrap.style.display = 'block';
    };
    reader.readAsDataURL(file);   // ← FileReader membaca file lokal
  });

  // (B) Color Picker — real-time saat warna berubah
  document.getElementById('pilihWarna').addEventListener('input', (e) => {
    const hex = e.target.value;
    applyColorToModel(hex);

    // Update UI swatch
    document.getElementById('colorSwatch').style.background = hex;
    document.getElementById('colorHex').textContent = hex.toUpperCase();
  });

  // (C) Hapus desain
  document.getElementById('removeDesain').addEventListener('click', () => {
    if (!bajuModel) return;
    bajuModel.traverse((child) => {
      if (child.isMesh) {
        child.material.map         = null;
        child.material.needsUpdate = true;
      }
    });
    document.getElementById('preview-wrap').style.display = 'none';
    document.getElementById('uploadDesain').value = '';
    showStatus('🗑 Desain dihapus');
  });

  // (D) Reset button
  document.getElementById('resetBtn').addEventListener('click', resetModel);

  /* ════════════════════════════════════════════════
     HELPER: Status bar
  ════════════════════════════════════════════════ */
  let statusTimer = null;
  function showStatus(msg) {
    const bar = document.getElementById('status-bar');
    bar.textContent = msg;
    bar.classList.add('show');
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => bar.classList.remove('show'), 3000);
  }

  /* ════════════════════════════════════════════════
     RENDER LOOP
  ════════════════════════════════════════════════ */
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  /* Responsive resize */
  window.addEventListener('resize', () => {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

</script>
</body>
</html>
